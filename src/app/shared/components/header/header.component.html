<header class="header">
  <div class="header__left">
    <button class="icon-btn" type="button" (click)="toggleSidebar.emit()" aria-label="Alternar menu">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
      </svg>
    </button>
    <h1 class="header__title">{{ pageTitle }}</h1>
  </div>

  <div class="header__right">
    <!-- Alternância de tema -->
    <button class="icon-btn" type="button" (click)="toggleTheme()"
            [attr.aria-label]="themeService.theme() === 'dark' ? 'Ativar tema claro' : 'Ativar tema escuro'">
      @if (themeService.theme() === 'dark') {
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.7" />
          <path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"
                stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
        </svg>
      }
    </button>

    <!-- Menu do usuário -->
    @if (auth.user(); as user) {
      <div class="user-menu" (focusout)="closeUserMenu()">
        <button class="user-menu__trigger" type="button" (click)="toggleUserMenu()">
          <span class="avatar">{{ initials }}</span>
          <span class="user-menu__info">
            <strong>{{ user.name }}</strong>
            <small>{{ user.role }}</small>
          </span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        @if (userMenuOpen()) {
          <div class="user-menu__dropdown">
            <div class="user-menu__header">
              <strong>{{ user.name }}</strong>
              <span>{{ user.email }}</span>
            </div>
            <button type="button" class="user-menu__logout" (click)="logout()">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
                      stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              Sair
            </button>
          </div>
        }
      </div>
    }
  </div>
</header>
